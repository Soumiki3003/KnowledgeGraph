<!doctype html>
<html lang="en" data-theme="cupcake">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}KnowledgeGraph{% endblock %}</title>

        <!-- DaisyUI + Tailwind -->
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
            rel="stylesheet"
        />
        <script src="https://cdn.tailwindcss.com"></script>

        <!-- HTMX -->
        <script src="https://unpkg.com/htmx.org@2.0.4"></script>

        <!-- Markdown renderer -->
        <script src="https://cdn.jsdelivr.net/npm/marked@14/lib/marked.umd.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                function renderMarkdown(root) {
                    (root || document).querySelectorAll('.md-bubble:not([data-rendered])').forEach(function (el) {
                        el.innerHTML = marked.parse(el.textContent.trim());
                        el.setAttribute('data-rendered', '1');
                    });
                }
                renderMarkdown();
                document.body.addEventListener('htmx:afterSwap', function (e) {
                    renderMarkdown(e.detail.target);
                });
            });
        </script>

        <style>
            .md-bubble p { margin-bottom: 0.5em; }
            .md-bubble p:last-child { margin-bottom: 0; }
            .md-bubble h1, .md-bubble h2, .md-bubble h3 { font-weight: 700; margin-top: 0.6em; margin-bottom: 0.25em; }
            .md-bubble h1 { font-size: 1.15em; }
            .md-bubble h2 { font-size: 1.08em; }
            .md-bubble h3 { font-size: 1.02em; }
            .md-bubble ul, .md-bubble ol { margin-left: 1.25em; margin-bottom: 0.5em; }
            .md-bubble ul { list-style-type: disc; }
            .md-bubble ol { list-style-type: decimal; }
            .md-bubble li { margin-bottom: 0.15em; }
            .md-bubble strong { font-weight: 700; }
            .md-bubble em { font-style: italic; }
            .md-bubble code:not(pre code) { background: rgba(0,0,0,0.12); padding: 0.1em 0.3em; border-radius: 0.25em; font-family: monospace; font-size: 0.88em; }
            .md-bubble pre { background: rgba(0,0,0,0.12); padding: 0.75em; border-radius: 0.5em; overflow-x: auto; margin-bottom: 0.5em; white-space: pre; }
            .md-bubble pre code { background: none; padding: 0; font-family: monospace; font-size: 0.88em; }
            .md-bubble blockquote { border-left: 3px solid currentColor; padding-left: 0.75em; opacity: 0.75; margin: 0.5em 0; }
            .md-bubble hr { border: none; border-top: 1px solid currentColor; opacity: 0.3; margin: 0.6em 0; }
        </style>

        {% block head %}{% endblock %}
    </head>

    <body class="min-h-screen bg-base-200">
        <!-- Optional navbar -->
        {% block navbar %}{% endblock %}

        <main class="{% block main_class %}container mx-auto{% endblock %} p-4">
            {% block content %}{% endblock %}
        </main>

        <!-- Toast/alert container for HTMX responses -->
        <div id="toast-container" class="toast toast-end"></div>
    </body>
</html>
